<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pokeball base circle -->
  <circle cx="50" cy="50" r="48" fill="#CC0000" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Bottom white half -->
  <path d="M 2 50 A 48 48 0 0 0 98 50 Z" fill="#F5F5F5"/>
  <!-- Calculator screen in top red half -->
  <rect x="22" y="14" width="56" height="22" rx="3" ry="3" fill="#1A1A1A" opacity="0.85"/>
  <rect x="24" y="16" width="52" height="18" rx="2" ry="2" fill="#5ABA4A"/>
  <!-- Screen text/display lines -->
  <rect x="52" y="20" width="20" height="4" rx="1" fill="#1A1A1A" opacity="0.5"/>
  <rect x="52" y="26" width="14" height="4" rx="1" fill="#1A1A1A" opacity="0.8"/>
  <!-- Center black band -->
  <rect x="2" y="44" width="96" height="12" fill="#1A1A1A"/>
  <!-- Center button -->
  <circle cx="50" cy="50" r="10" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
  <circle cx="50" cy="50" r="7" fill="#F5F5F5" stroke="#555" stroke-width="1"/>
  <!-- Calculator buttons in white half -->
  <!-- Row 1 -->
  <rect x="22" y="62" width="11" height="8" rx="1.5" fill="#BBBBBB"/>
  <rect x="36" y="62" width="11" height="8" rx="1.5" fill="#BBBBBB"/>
  <rect x="50" y="62" width="11" height="8" rx="1.5" fill="#BBBBBB"/>
  <rect x="64" y="62" width="14" height="8" rx="1.5" fill="#CC0000"/>
  <!-- Row 2 -->
  <rect x="22" y="73" width="11" height="8" rx="1.5" fill="#BBBBBB"/>
  <rect x="36" y="73" width="11" height="8" rx="1.5" fill="#BBBBBB"/>
  <rect x="50" y="73" width="11" height="8" rx="1.5" fill="#BBBBBB"/>
  <rect x="64" y="73" width="14" height="8" rx="1.5" fill="#CC0000"/>
  <!-- Button symbols -->
  <text x="27.5" y="69" font-size="5" fill="#333" text-anchor="middle" font-family="monospace">7</text>
  <text x="41.5" y="69" font-size="5" fill="#333" text-anchor="middle" font-family="monospace">8</text>
  <text x="55.5" y="69" font-size="5" fill="#333" text-anchor="middle" font-family="monospace">9</text>
  <text x="71" y="69" font-size="5" fill="#FFF" text-anchor="middle" font-family="monospace">÷</text>
  <text x="27.5" y="80" font-size="5" fill="#333" text-anchor="middle" font-family="monospace">4</text>
  <text x="41.5" y="80" font-size="5" fill="#333" text-anchor="middle" font-family="monospace">5</text>
  <text x="55.5" y="80" font-size="5" fill="#333" text-anchor="middle" font-family="monospace">6</text>
  <text x="71" y="80" font-size="5" fill="#FFF" text-anchor="middle" font-family="monospace">×</text>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#1A1A1A" stroke-width="3"/>
</svg>
